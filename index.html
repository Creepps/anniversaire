<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Surprise !</title>
    <style>
        :root {
            --bg-color: #2c2c2c; 
            --text-color: #ffffff;
        }
        body {
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100dvh; 
            overflow: hidden; 
            touch-action: none;
        }
        .header { text-align: center; margin-bottom: 25px; z-index: 10; }
        .rebus { font-size: 2.8rem; letter-spacing: 12px; margin: 10px 0; }
        
        #scratch-container {
            position: relative; 
            width: 320px; 
            height: 320px;
            max-width: 90vw; 
            max-height: 90vw;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-radius: 12px; 
            overflow: hidden;
            background-color: #1a1a1a;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #main-logo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            opacity: 0;
        }

        #scratch-canvas {
            position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair;
            width: 100%; height: 100%;
        }

        #u-easter-egg {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 15px); 
            right: 15px;
            font-size: 0.6rem; 
            color: #575151; 
            opacity: 0.1;
            user-select: none; 
            pointer-events: none; 
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="rebus">🥖 🍚 🎲 🅰️</div>
        <p>Trouve le rébus !</p>
    </div>

    <div id="scratch-container">
        <img src="logo.jpg" id="main-logo">
        <canvas id="scratch-canvas" width="320" height="320"></canvas>
    </div>

    <div id="u-easter-egg">u</div>

    <script>
        const container = document.getElementById('scratch-container');
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const logo = document.getElementById('main-logo');
        let isDrawing = false;
        let isReady = false;

        function init() {
            ctx.fillStyle = '#4a4a4a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 800; i++) {
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                ctx.fillRect(Math.random()*320, Math.random()*320, 1, 1);
            }

            setTimeout(() => {
                isReady = true;
                logo.style.opacity = "1";
                container.style.opacity = "1";
                container.style.pointerEvents = "auto";
            }, 300);
        }

        function scratch(e) {
            if (!isDrawing || !isReady) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * scaleX;
            const y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * scaleY;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); }, {passive: false});

        window.onload = init;
    </script>
</body>
</html>
